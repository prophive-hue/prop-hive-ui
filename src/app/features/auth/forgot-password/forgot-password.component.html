<div class="text-center mb-4">
  <h2 class="fw-bold">Forgot Password</h2>
  <p class="text-muted">Enter your email and we'll send you a reset link</p>
</div>

<div *ngIf="emailSent" class="alert alert-success mb-3">
  If an account exists with this email, a password reset link has been sent. Please check your inbox.
</div>

<form *ngIf="!emailSent" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div *ngIf="error" class="alert alert-danger mb-3">
    {{ error.message }}
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email address</label>
    <input
      type="email"
      formControlName="email"
      class="form-control"
      [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
      id="email"
      placeholder="Enter your email"
    />
    <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
      <div *ngIf="f['email'].errors['required']">Email is required</div>
      <div *ngIf="f['email'].errors['email']">Please enter a valid email address</div>
    </div>
  </div>

  <div class="d-grid gap-2">
    <button type="submit" class="btn btn-primary" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
      Send Reset Link
    </button>
  </div>
</form>

<div class="mt-3 text-center">
  <a routerLink="/auth/login" class="text-decoration-none">Back to Sign In</a>
</div>
