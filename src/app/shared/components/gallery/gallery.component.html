<p-dialog *ngIf="visible" [(visible)]="visible" modal header="Property Images" [style]="{'width': '700px'}">
  <p-galleria [value]="images" [responsiveOptions]="responsiveOptions"
              [containerStyle]="{ 'max-width': '640px' }" [numVisible]="5" [circular]="true">
    <ng-template #item let-item>
      <img [src]="item.itemImageSrc" style="width: 100%; max-height: 400px; object-fit: contain; display: block;" alt="Property Image"/>
    </ng-template>
    <ng-template #thumbnail let-item>
      <img [src]="item.thumbnailImageSrc" style="width: 80px; height: 60px; object-fit: cover; display: block;" alt="Thumbnail"/>
    </ng-template>
  </p-galleria>
</p-dialog>
