<ngx-ui-loader [overlayColor]="'rgba(135,128,128,0.3)'" [fgsType]="'three-strings'" [bgsOpacity]="0.1"
               fgsColor="#007FFF" [loaderId]="'loader'"></ngx-ui-loader>

<!-- Category Chips -->
<section class="features py-4">
  <div class="container">
    <div class="d-block d-md-none">
      <div class="d-flex flex-row flex-nowrap gap-3 overflow-auto pb-2">
        <div class="flex-shrink-0" *ngFor="let feature of features">
          <div class="card border-0 shadow-sm feature-card" style="min-width: 140px;"
               [class.active]="selectedPropertyType === feature.title"
               (click)="filterByCategory(feature.title)">
            <div class="card-body text-center py-3">
              <div class="feature-icon d-inline-flex align-items-center justify-content-center fs-4 mb-2">
                <i class="{{ feature.icon }}"></i>
              </div>
              <h6 class="card-title mb-0">{{ feature.title }}</h6>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-none d-md-block">
      <div class="row g-3 justify-content-center">
        <div class="col-md-6 col-lg-4 col-xl-2" *ngFor="let feature of features">
          <div class="card h-100 border-0 shadow-sm feature-card"
               [class.active]="selectedPropertyType === feature.title"
               (click)="filterByCategory(feature.title)">
            <div class="card-body text-center py-3">
              <div class="feature-icon d-inline-flex align-items-center justify-content-center fs-4 mb-2">
                <i class="{{ feature.icon }}"></i>
              </div>
              <h6 class="card-title mb-0">{{ feature.title }}</h6>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Search + Filters -->
<div class="container mb-2">
  <div class="form-group d-flex">
    <div class="input-group mx-1">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input class="form-control" placeholder="search properties..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
    </div>
    <div>
      <button class="btn btn-primary mx-1" (click)="onSearch()">Search</button>
    </div>
  </div>
</div>

<div class="container mb-2 mt-3">
  <div class="row g-1 justify-content-between">
    <div class="col-6 col-md-4 col-lg-2">
      <select class="form-select" [(ngModel)]="selectedInvestmentType" (change)="onFilterChange()">
        <option value="">Investment Type</option>
        @for (t of investmentTypes; track investmentTypes) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <select class="form-select" [(ngModel)]="selectedProjectType" (change)="onFilterChange()">
        <option value="">Project Type</option>
        @for (t of propertyCompletionTypes; track propertyCompletionTypes) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <select class="form-select" [(ngModel)]="selectedPropertyType" (change)="onFilterChange()">
        <option value="">Property Type</option>
        @for (t of propertyTypes; track propertyTypes) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>
    <div class="col-6 col-md-4 col-lg-2">
      <select class="form-select" [(ngModel)]="selectedPropertyValue" (change)="onFilterChange()">
        <option value="">Property Value</option>
        @for (t of propertyValues; track propertyValues) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>
    <div class="col-12 col-md-4 col-lg-2">
      <select class="form-select" [(ngModel)]="selectedManagementType" (change)="onFilterChange()">
        <option value="">Property Management</option>
        @for (t of managementTypes; track managementTypes) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>
  </div>
</div>

<!-- Property List -->
@if (properties.length > 0) {
  <div class="container mb-4">
    <div class="property-list">
      @for (p of properties; track p.id) {
        <app-card-property
          [property]="p"
          [isFavorited]="isFavorited(p.id)"
          [showFavoriteButton]="showFavorites"
          (favoriteToggle)="onFavoriteToggle($event)">
        </app-card-property>
      }
    </div>

    <div class="d-flex justify-content-center mt-4">
      <nav>
        <ul class="pagination">
          <li class="page-item" [class.disabled]="page === 0">
            <a class="page-link" (click)="previousPage()" href="javascript:void(0)">Previous</a>
          </li>
          <li class="page-item disabled">
            <span class="page-link">Page {{ page + 1 }}</span>
          </li>
          <li class="page-item" [class.disabled]="properties.length < size">
            <a class="page-link" (click)="nextPage()" href="javascript:void(0)">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
} @else if (!loading) {
  <div class="container mb-4 text-center py-5">
    <i class="bi bi-building fs-1 text-muted"></i>
    <p class="text-muted mt-2">No properties found matching your filters.</p>
  </div>
}
